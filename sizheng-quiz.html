<!doctype html>
<!--
Huashu-design pass 1 assumptions:
- 目标用户：正在准备《习近平新时代中国特色社会主义思想概论》课程考试的大学生。
- 使用场景：电脑或手机浏览器离线刷题，重点是快速记忆高频概念、即时纠错、沉淀错题。
- 信息架构：左侧高频考点和进度，右侧刷题主流程；移动端改为上下布局。
- 内容边界：这是非官方学习练习题库，题目按公开教材/课堂常见口径整理，最终以任课教师和教材为准。
- 设计策略：学习工具优先，不做宣传落地页；色彩采用纸面白、深墨、红色强调和少量青绿色反馈，避免单一红色铺满造成疲劳。
-->
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>大学生新思想课程刷题</title>
  <style>
    :root {
      --paper: #f7f3ea;
      --panel: #fffdf8;
      --ink: #1f2328;
      --muted: #6d706c;
      --line: #ded7c9;
      --red: #b42318;
      --red-soft: #fff0ed;
      --green: #24745a;
      --green-soft: #edf8f4;
      --blue: #285f8f;
      --blue-soft: #eef6ff;
      --gold: #8b6418;
      --shadow: 0 18px 60px rgba(43, 34, 17, .10);
      --radius: 8px;
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(180, 35, 24, .045) 1px, transparent 1px),
        linear-gradient(180deg, rgba(40, 95, 143, .035) 1px, transparent 1px),
        var(--paper);
      background-size: 28px 28px;
      font-family: "Noto Serif SC", "Source Han Serif SC", "Songti SC", "SimSun", serif;
      line-height: 1.7;
    }

    button, input, select {
      font: inherit;
    }

    button {
      min-height: 44px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      border-radius: var(--radius);
      padding: 9px 14px;
      cursor: pointer;
      transition: transform .18s ease, border-color .18s ease, background .18s ease, color .18s ease;
    }

    button:hover {
      transform: translateY(-1px);
      border-color: color-mix(in oklch, var(--red) 45%, var(--line));
    }

    button.primary {
      background: var(--red);
      border-color: var(--red);
      color: white;
      font-weight: 700;
    }

    button.ghost {
      background: transparent;
    }

    button.small {
      min-height: 36px;
      padding: 6px 10px;
      font-size: 13px;
    }

    button.active {
      background: var(--ink);
      border-color: var(--ink);
      color: white;
    }

    button:disabled {
      opacity: .45;
      cursor: not-allowed;
      transform: none;
    }

    .shell {
      width: min(1440px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 28px 0 36px;
    }

    .masthead {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 20px;
      align-items: end;
      padding: 22px 0 24px;
      border-bottom: 2px solid var(--ink);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--red);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0;
    }

    .eyebrow::before {
      content: "";
      width: 22px;
      height: 2px;
      background: var(--red);
      display: inline-block;
    }

    h1 {
      margin: 8px 0 6px;
      max-width: 900px;
      font-size: clamp(34px, 5vw, 72px);
      line-height: 1.05;
      letter-spacing: 0;
      text-wrap: balance;
    }

    .subtitle {
      max-width: 760px;
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      text-wrap: pretty;
    }

    .source-note {
      max-width: 340px;
      color: var(--muted);
      font-size: 13px;
      border-top: 1px solid var(--line);
      padding-top: 10px;
    }

    .source-card {
      max-width: 390px;
      display: grid;
      gap: 12px;
      align-self: stretch;
      align-content: end;
    }

    .icon-strip {
      display: grid;
      grid-template-columns: repeat(5, 58px);
      gap: 8px;
      justify-content: end;
    }

    .cartoon-icon {
      width: 58px;
      height: 58px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: color-mix(in oklch, var(--panel) 86%, white);
      box-shadow: 0 10px 26px rgba(43, 34, 17, .08);
    }

    .cartoon-icon svg {
      width: 46px;
      height: 46px;
      display: block;
    }

    .cartoon-icon .ink { stroke: var(--ink); }
    .cartoon-icon .red { fill: var(--red); }
    .cartoon-icon .gold { fill: #d8a83b; }
    .cartoon-icon .blue { fill: var(--blue); }
    .cartoon-icon .green { fill: var(--green); }
    .cartoon-icon .paper { fill: #fff8e8; }

    .panel-title {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .title-mark {
      width: 26px;
      height: 26px;
      display: inline-grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--red-soft);
      flex: 0 0 auto;
    }

    .title-mark svg {
      width: 18px;
      height: 18px;
      display: block;
    }

    .layout {
      display: grid;
      grid-template-columns: 330px minmax(0, 1fr);
      gap: 22px;
      margin-top: 22px;
      align-items: start;
    }

    .sidebar {
      position: sticky;
      top: 14px;
      display: grid;
      gap: 14px;
    }

    .panel {
      background: color-mix(in oklch, var(--panel) 92%, white);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-head {
      padding: 16px 18px 12px;
      border-bottom: 1px solid var(--line);
    }

    .panel-title {
      margin: 0;
      font-size: 18px;
      line-height: 1.35;
    }

    .panel-body {
      padding: 16px 18px 18px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      border-bottom: 1px solid var(--line);
    }

    .stat {
      padding: 14px 10px;
      text-align: center;
      border-right: 1px solid var(--line);
    }

    .stat:last-child { border-right: 0; }

    .stat strong {
      display: block;
      font-size: 24px;
      line-height: 1.1;
    }

    .stat span {
      color: var(--muted);
      font-size: 12px;
    }

    .progress {
      height: 10px;
      background: #ebe4d6;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 12px;
    }

    .progress i {
      display: block;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--red), var(--gold));
      transition: width .3s ease;
    }

    .topic-list {
      display: grid;
      gap: 8px;
    }

    .topic {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      text-align: left;
      align-items: center;
      min-height: 42px;
      background: transparent;
    }

    .topic span:first-child {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .topic b {
      color: var(--muted);
      font-size: 12px;
      font-weight: 500;
    }

    .point-grid {
      display: grid;
      gap: 11px;
    }

    .point {
      border-bottom: 1px solid var(--line);
      padding-bottom: 11px;
    }

    .point:last-child {
      border-bottom: 0;
      padding-bottom: 0;
    }

    .point h3 {
      margin: 0 0 5px;
      font-size: 15px;
      line-height: 1.45;
    }

    .point p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .main {
      min-width: 0;
      display: grid;
      gap: 16px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px;
      box-shadow: var(--shadow);
    }

    .seg {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .command-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .command-row button.active {
      background: var(--red-soft);
      border-color: color-mix(in oklch, var(--red) 42%, var(--line));
      color: var(--red);
    }

    .quiz {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      min-height: 560px;
      overflow: hidden;
    }

    .quiz.done {
      display: none;
    }

    .quiz-top {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
      align-items: center;
    }

    .badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 2px 10px;
      font-size: 12px;
      color: var(--muted);
      background: #faf7ef;
      white-space: nowrap;
    }

    .badge.red {
      border-color: color-mix(in oklch, var(--red) 25%, var(--line));
      background: var(--red-soft);
      color: var(--red);
      font-weight: 700;
    }

    .quiz-body {
      padding: 24px 24px 18px;
    }

    .question {
      margin: 0 0 22px;
      font-size: clamp(22px, 3vw, 34px);
      line-height: 1.35;
      text-wrap: pretty;
    }

    .options {
      display: grid;
      gap: 10px;
    }

    .option {
      display: grid;
      grid-template-columns: 34px 1fr;
      gap: 12px;
      align-items: start;
      width: 100%;
      min-height: 58px;
      padding: 13px 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fffaf1;
      text-align: left;
    }

    .option:hover {
      transform: none;
      border-color: color-mix(in oklch, var(--blue) 40%, var(--line));
    }

    .mark {
      width: 30px;
      height: 30px;
      display: inline-grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      background: white;
      font-weight: 800;
      line-height: 1;
    }

    .option.selected {
      border-color: var(--blue);
      background: var(--blue-soft);
    }

    .option.selected .mark {
      border-color: var(--blue);
      color: white;
      background: var(--blue);
    }

    .option.correct {
      border-color: var(--green);
      background: var(--green-soft);
    }

    .option.correct .mark {
      border-color: var(--green);
      color: white;
      background: var(--green);
    }

    .option.wrong {
      border-color: var(--red);
      background: var(--red-soft);
    }

    .option.wrong .mark {
      border-color: var(--red);
      color: white;
      background: var(--red);
    }

    .option.locked {
      cursor: default;
    }

    .feedback {
      display: none;
      margin-top: 18px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fbf7ee;
      padding: 14px 16px;
    }

    .feedback.show {
      display: block;
    }

    .feedback strong {
      display: block;
      margin-bottom: 5px;
      color: var(--ink);
    }

    .feedback p {
      margin: 0;
      color: var(--muted);
    }

    .quiz-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: space-between;
      align-items: center;
      padding: 18px 24px 24px;
    }

    .left-actions, .right-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .review {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .result {
      display: none;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px;
    }

    .result.show {
      display: grid;
      gap: 18px;
    }

    .score {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 18px;
      align-items: center;
    }

    .score-number {
      width: 128px;
      height: 128px;
      display: grid;
      place-items: center;
      border: 2px solid var(--red);
      border-radius: 50%;
      color: var(--red);
      font-size: 40px;
      font-weight: 900;
      line-height: 1;
      background: var(--red-soft);
    }

    .score-copy h2 {
      margin: 0 0 4px;
      font-size: clamp(24px, 6vw, 42px);
      line-height: 1.2;
    }

    .score-copy p {
      margin: 0;
      color: var(--muted);
    }

    .result-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .review-block {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
    }

    .review-block h2 {
      margin: 0 0 10px;
      font-size: 18px;
    }

    .mini-list {
      display: grid;
      gap: 8px;
      max-height: 300px;
      overflow: auto;
      padding-right: 4px;
    }

    .mini-item {
      display: grid;
      gap: 4px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fffaf1;
    }

    .mini-item button {
      width: fit-content;
    }

    .empty {
      color: var(--muted);
      font-size: 14px;
    }

    .footer-note {
      color: var(--muted);
      font-size: 12px;
      text-align: center;
      padding: 14px 0 0;
    }

    @media (max-width: 980px) {
      .masthead, .layout, .toolbar, .quiz-top, .review {
        grid-template-columns: 1fr;
      }

      .source-card {
        max-width: none;
        align-content: start;
      }

      .icon-strip {
        justify-content: start;
      }

      .sidebar {
        position: static;
      }

      .command-row {
        justify-content: flex-start;
      }
    }

    @media (max-width: 620px) {
      .shell {
        width: 100%;
        padding: 0 10px 18px;
      }

      .masthead {
        padding-top: 10px;
      }

      .source-note {
        max-width: none;
      }

      .source-card {
        gap: 8px;
      }

      .icon-strip {
        grid-template-columns: repeat(5, 1fr);
        gap: 6px;
      }

      .cartoon-icon {
        width: 100%;
        height: 46px;
        border-radius: 12px;
      }

      .cartoon-icon svg {
        width: 36px;
        height: 36px;
      }

      .quiz-body, .quiz-actions {
        padding-left: 14px;
        padding-right: 14px;
      }

      .option {
        grid-template-columns: 30px 1fr;
        padding: 12px;
      }

      .stats {
        grid-template-columns: 1fr 1fr 1fr;
      }

      .toolbar,
      .quiz,
      .result,
      .review-block,
      .panel {
        box-shadow: 0 10px 26px rgba(43, 34, 17, .08);
      }

      .question {
        font-size: 21px;
      }

      .quiz-top {
        padding: 14px;
      }

      .quiz-actions {
        position: sticky;
        bottom: 0;
        background: color-mix(in oklch, var(--panel) 92%, transparent);
        backdrop-filter: blur(14px);
        border-top: 1px solid var(--line);
      }

      .left-actions,
      .right-actions,
      .quiz-actions button {
        width: 100%;
      }

      .score {
        grid-template-columns: 1fr;
      }

      .score-number {
        width: 108px;
        height: 108px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="masthead">
      <div>
        <div class="eyebrow">高校思政课练习题库</div>
        <h1>大学生新思想课程刷题</h1>
        <p class="subtitle">按高频考点整理单选题、多选题、判断题。每轮从大题库随机抽 60 道，点选即判定，做完自动按 100 分制出分，适合手机期末冲刺。</p>
      </div>
      <div class="source-card">
        <div class="icon-strip" aria-hidden="true">
          <span class="cartoon-icon">
            <svg viewBox="0 0 64 64" role="img">
              <path class="paper" d="M14 15h15c4 0 7 3 7 7v29c0-4-3-7-7-7H14z"/>
              <path class="paper" d="M50 15H36c-4 0-7 3-7 7v29c0-4 3-7 7-7h14z"/>
              <path class="ink" d="M14 15h15c4 0 7 3 7 7v29c0-4-3-7-7-7H14zM50 15H36c-4 0-7 3-7 7v29c0-4 3-7 7-7h14z" fill="none" stroke-width="3" stroke-linejoin="round"/>
              <path class="red" d="M22 24h8v4h-8zM40 24h5v4h-5z"/>
            </svg>
          </span>
          <span class="cartoon-icon">
            <svg viewBox="0 0 64 64" role="img">
              <path class="ink" d="M20 52V13" fill="none" stroke-width="4" stroke-linecap="round"/>
              <path class="red" d="M22 14c9-5 15 5 25 0v24c-10 5-16-5-25 0z"/>
              <path class="gold" d="M30 18l2 4 4 .5-3 3 .8 4.2-3.8-2-3.8 2 .8-4.2-3-3 4-.5z"/>
              <path class="ink" d="M22 14c9-5 15 5 25 0v24c-10 5-16-5-25 0z" fill="none" stroke-width="3" stroke-linejoin="round"/>
            </svg>
          </span>
          <span class="cartoon-icon">
            <svg viewBox="0 0 64 64" role="img">
              <path class="blue" d="M32 10l18 7v12c0 12-7 20-18 25-11-5-18-13-18-25V17z"/>
              <path class="paper" d="M25 30l5 5 11-13 4 4-15 17-9-9z"/>
              <path class="ink" d="M32 10l18 7v12c0 12-7 20-18 25-11-5-18-13-18-25V17z" fill="none" stroke-width="3" stroke-linejoin="round"/>
            </svg>
          </span>
          <span class="cartoon-icon">
            <svg viewBox="0 0 64 64" role="img">
              <path class="paper" d="M18 16h28a6 6 0 0 1 0 12H18a6 6 0 0 1 0-12zM18 28h28v20H18z"/>
              <path class="gold" d="M17 48h30a5 5 0 0 1 0 10H17a5 5 0 0 1 0-10z"/>
              <path class="ink" d="M18 16h28a6 6 0 0 1 0 12H18a6 6 0 0 1 0-12zM18 28h28v20H18M17 48h30a5 5 0 0 1 0 10H17a5 5 0 0 1 0-10z" fill="none" stroke-width="3" stroke-linejoin="round"/>
              <path class="red" d="M25 34h14v4H25z"/>
            </svg>
          </span>
          <span class="cartoon-icon">
            <svg viewBox="0 0 64 64" role="img">
              <path class="gold" d="M20 54h24l-4-28H24z"/>
              <path class="red" d="M25 26h14l-7-14z"/>
              <path class="paper" d="M28 38a4 4 0 1 0 8 0 4 4 0 0 0-8 0z"/>
              <path class="ink" d="M20 54h24l-4-28H24zM25 26h14l-7-14z" fill="none" stroke-width="3" stroke-linejoin="round"/>
              <path class="ink" d="M16 54h32" fill="none" stroke-width="3" stroke-linecap="round"/>
            </svg>
          </span>
        </div>
        <div class="source-note">非官方学习工具。题目依据公开教材信息和课堂常见知识点整理，考试表述请以任课教师、教材和学校题库为准。</div>
      </div>
    </header>

    <section class="layout">
      <aside class="sidebar">
        <section class="panel">
          <div class="stats">
            <div class="stat"><strong id="sDone">0</strong><span>已答</span></div>
            <div class="stat"><strong id="sRate">0%</strong><span>正确率</span></div>
            <div class="stat"><strong id="sWrong">0</strong><span>错题</span></div>
          </div>
          <div class="panel-body">
            <div class="badge-row">
              <span class="badge red" id="sScope">全部题型</span>
              <span class="badge" id="sTotal">0 题</span>
            </div>
            <div class="progress"><i id="bar"></i></div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h2 class="panel-title">
              <span class="title-mark" aria-hidden="true">
                <svg viewBox="0 0 24 24">
                  <path d="M7 4h10v16l-5-3-5 3z" fill="#b42318"/>
                  <path d="M7 4h10v16l-5-3-5 3z" fill="none" stroke="#1f2328" stroke-width="1.6" stroke-linejoin="round"/>
                </svg>
              </span>
              高频考点速记
            </h2>
          </div>
          <div class="panel-body point-grid" id="pointGrid"></div>
        </section>
      </aside>

      <section class="main">
        <div class="toolbar">
          <div class="seg">
            <button class="small active" id="btnCourseXsd">新思想</button>
            <button class="small" id="btnCourseMao">毛中特</button>
            <button class="small" id="btnCourseHistory">近现代史</button>

    function makeQuestionSet(base, facts) {
      let nextId = (base.length ? Math.max(...base.map(q => q.id)) : 0) + 1;
      const generated = [];
      facts.forEach((fact, factIndex) => {
        const singleItems = rotateOptions([fact.desc, ...fact.wrong.slice(0, 3)], factIndex);
        generated.push({
          id: nextId++,
          type: "single",
          topic: fact.topic,
          q: `关于「${fact.key}」的表述，正确的是？`,
          o: singleItems.map(item => item.text),
          a: [singleItems.findIndex(item => item.original === 0)],
          exp: fact.desc
        });

        const multiWrong = fact.wrong.slice(0, Math.max(1, 4 - fact.tags.length));
        const multiSource = [...fact.tags.map(text => ({ text, correct: true })), ...multiWrong.map(text => ({ text, correct: false }))];
        const multiItems = rotateOptions(multiSource, factIndex + 1);
        generated.push({
          id: nextId++,
          type: "multi",
          topic: fact.topic,
          q: `学习「${fact.key}」时，应把握的关键词包括？`,
          o: multiItems.map(item => item.text),
          a: multiItems.map((item, i) => item.correct ? i : -1).filter(i => i >= 0),
          exp: `关键词：${fact.tags.join("、")}。${fact.desc}`
        });

        const falseText = fact.wrong[(factIndex + 1) % fact.wrong.length] || "错误表述";
        const judgeIsTrue = factIndex % 2 === 0;
        generated.push({
          id: nextId++,
          type: "judge",
          topic: fact.topic,
          q: judgeIsTrue ? `「${fact.key}」可以概括为：${fact.desc}` : `「${fact.key}」可以概括为：${falseText}。`,
          o: ["正确", "错误"],
          a: [judgeIsTrue ? 0 : 1],
          exp: fact.desc
        });
      });
      return [...base, ...generated];
    }

            "q": "2000年在广东考察时，江泽民同志首次完整提出了“三个代表”的要求:“我们党所以赢得人民的拥护，是因为我们党在革命、建设、改革的各个历史时期，总是代表着中国先进生产力的发展要求，代表着中国先进文化的前进方向，代表着中国最广大人民的根本利益。”",
            "o": [
                  "正确",
                  "错误"
            ],
            "a": [
                  0
            ],
            "exp": "对"
      },
      {
            "id": "mao-cx-069",
            "type": "judge",
            "topic": "超星导入",
            "q": "邓小平理论是在深刻总结我国社会主义建设正反两方面历史经验，并借鉴其他社会主义国家兴衰成败经验教训的基础上形成的。因此，社会主义建设的经验教训是邓小平理论形成的现实根据。",
            "o": [
                  "正确",
                  "错误"
            ],
            "a": [
                  0
            ],
            "exp": "对"
      },
      {
            "id": "mao-cx-070",
            "type": "judge",
            "topic": "超星导入",
            "q": "党的十四大郑重地把邓小平理论同马克思列宁主义、毛泽东思想一起，确立为党的指导思想并写入党章。",
            "o": [
                  "正确",
                  "错误"
            ],
            "a": [
                  1
            ],
            "exp": "错"
      },
      {
            "id": "mao-cx-071",
            "type": "judge",
            "topic": "超星导入",
            "q": "社会主义的本质，是解放生产力，发展生产力，消灭剥削，消除两极分化，最终达到共同富裕。",
            "o": [
                  "正确",
                  "错误"
            ],
            "a": [
                  0
            ],
            "exp": "对"
      },
      {
            "id": "mao-cx-072",
            "type": "judge",
            "topic": "超星导入",
            "q": "【本题上判断题，设置时出现错误，此题上判断题哈！请写出判断正误及原因】\n科学发展观的核心立场是以人为本，根本方法是重点发展。",
            "o": [
                  "正确",
                  "错误"
            ],
            "a": [
                  1
            ],
            "exp": "错误。"
      }
];

    const COURSE_CONFIG = {
      xsd: { label: "新思想", full: "习近平新时代中国特色社会主义思想概论", base: BASE_BANK, facts: HIGH_FREQ_FACTS },
      mao: { label: "毛中特", full: "毛泽东思想和中国特色社会主义理论体系概论", bank: MAO_BANK },
      history: { label: "近现代史", full: "中国近现代史纲要", base: [], facts: HISTORY_FACTS },
      marx: { label: "马原", full: "马克思主义基本原理", base: [], facts: MARX_FACTS },
      ethics: { label: "思法", full: "思想道德与法治", base: [], facts: ETHICS_FACTS }
    };

    const TYPE_LABEL = { single: "单选题", multi: "多选题", judge: "判断题" };
    const LETTERS = ["A", "B", "C", "D", "E", "F"];
    const STORE_KEY = "xsd_quiz_progress_v2";
    const COURSE_KEY = "xsd_quiz_course_v1";
    const ROUND_SIZE = 60;

    let courseKey = localStorage.getItem(COURSE_KEY) || "xsd";
    let BANK = makeCourseBank(courseKey);
    let record = loadRecord();
    let queue = [];
    let index = 0;
    let selected = new Set();
    let optionStates = {};
    let round = { ids: [], answers: {}, done: false };

    const $ = id => document.getElementById(id);

    function esc(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll("\"", "&quot;")
        .replaceAll("'", "&#039;");
    }

    function loadRecord() {
      try {
        return JSON.parse(localStorage.getItem(recordKey())) || { done: 0, correct: 0, wrongIds: [], favIds: [], answered: {}, lastScore: null };
      } catch {
        return { done: 0, correct: 0, wrongIds: [], favIds: [], answered: {}, lastScore: null };
      }
    }

    function saveRecord() {
      localStorage.setItem(recordKey(), JSON.stringify(record));
    }

    function recordKey() {
      return `${STORE_KEY}_${courseKey}`;
    }

    function makeCourseBank(key) {
      const config = COURSE_CONFIG[key] || COURSE_CONFIG.xsd;
      if (config.bank) return config.bank;
      return makeQuestionSet(config.base, config.facts);
    }

    function setCourse(key) {
      if (!COURSE_CONFIG[key] || key === courseKey) return;
      courseKey = key;
      localStorage.setItem(COURSE_KEY, courseKey);
      BANK = makeCourseBank(courseKey);
      record = loadRecord();
      renderStatic();
      buildQueue();
    }

    function questionType(q) {
      return TYPE_LABEL[q.type];
    }

    function candidatePool() {
      return BANK;
    }

    function sampleQuestions(pool, size = ROUND_SIZE) {
      const list = [...pool];
      for (let i = list.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [list[i], list[j]] = [list[j], list[i]];
      }
      return list.slice(0, Math.min(size, list.length));
    }

    function buildQueue() {
      queue = sampleQuestions(candidatePool());
      round = { ids: queue.map(q => q.id), answers: {}, done: false };
      record.wrongIds = [];
      saveRecord();
      index = 0;
      selected = new Set();
      optionStates = {};
      render();
    }

    function getRoundWrongIds() {
      return Object.entries(round.answers)
        .filter(([, answer]) => !answer.correct)
        .map(([id]) => Number(id));
    }

    function shuffleQueue() {
      buildQueue();
    }

    function renderStatic() {
      $("btnCourseXsd").classList.toggle("active", courseKey === "xsd");
      $("btnCourseMao").classList.toggle("active", courseKey === "mao");
      $("btnCourseHistory").classList.toggle("active", courseKey === "history");
      $("btnCourseMarx").classList.toggle("active", courseKey === "marx");
      $("btnCourseEthics").classList.toggle("active", courseKey === "ethics");
      $("btnCourseXsd").setAttribute("aria-pressed", courseKey === "xsd");
      $("btnCourseMao").setAttribute("aria-pressed", courseKey === "mao");
      $("btnCourseHistory").setAttribute("aria-pressed", courseKey === "history");
      $("btnCourseMarx").setAttribute("aria-pressed", courseKey === "marx");
      $("btnCourseEthics").setAttribute("aria-pressed", courseKey === "ethics");

      const points = POINTS[courseKey] || POINTS.xsd;
      $("pointGrid").innerHTML = points.map(p => `
        <div class="point">
          <h3>${esc(p.h)}</h3>
          <p>${esc(p.p)}</p>
        </div>
      `).join("");

    }

    function renderStats() {
      const answered = Object.keys(round.answers).length;
      const correct = Object.values(round.answers).filter(item => item.correct).length;
      const rate = answered ? Math.round(correct / answered * 100) : 0;
      $("sDone").textContent = answered;
      $("sRate").textContent = rate + "%";
      $("sWrong").textContent = answered - correct;
      $("sScope").textContent = `${COURSE_CONFIG[courseKey].label} · 60题`;
      $("sTotal").textContent = `${queue.length || 0} / ${BANK.length} 题库`;
      $("bar").style.width = queue.length ? Math.min(100, Math.round(answered / queue.length * 100)) + "%" : "0%";
      $("btnWrong").classList.toggle("active", false);
      $("btnWrong").setAttribute("aria-pressed", "false");
      $("btnWrong").disabled = !round.done || getRoundWrongIds().length === 0;
    }

    function render() {
      renderStats();
      renderReview();
      $("resultPanel").classList.toggle("show", round.done);
      document.querySelector(".quiz").classList.toggle("done", round.done);
      if (round.done) {
        renderResult();
        return;
      }
      const q = queue[index];
      if (!q) {
        $("counter").textContent = "暂无题目";
        $("questionMeta").innerHTML = `<span class="badge red">当前筛选无题</span>`;
        $("questionText").textContent = "这个筛选条件下没有题目。可以切回全部题型，或先答错一些题再使用错题模式。";
        $("options").innerHTML = "";
        $("feedback").className = "feedback";
        $("feedback").innerHTML = "";
      $("btnNext").disabled = true;
      $("btnStar").disabled = true;
      return;
      }

      const saved = round.answers[q.id];
      const isAnswered = Boolean(saved);
      const displaySelected = saved ? new Set(saved.picks) : selected;
      $("btnNext").disabled = !isAnswered || index >= queue.length - 1;
      $("btnStar").disabled = false;
      $("counter").textContent = `第 ${index + 1} / ${queue.length} 题`;
      $("questionMeta").innerHTML = `
        <span class="badge red">${esc(questionType(q))}</span>
        <span class="badge">${esc(COURSE_CONFIG[courseKey].label)}</span>
        <span class="badge">${esc(q.topic)}</span>
        <span class="badge">考点：${esc(shortPoint(q.topic))}</span>
      `;
      $("questionText").textContent = q.q;
      $("btnStar").textContent = record.favIds.includes(q.id) ? "取消收藏" : "收藏本题";
      $("btnNext").textContent = index >= queue.length - 1 ? "本轮结束" : "下一题";

      $("options").innerHTML = q.o.map((text, i) => {
        const isSel = displaySelected.has(i);
        const isCorrect = q.a.includes(i);
        const instantCorrect = optionStates[i] === "correct";
        const instantWrong = optionStates[i] === "wrong";
        const cls = [
          "option",
          isSel ? "selected" : "",
          (isAnswered && isCorrect) || instantCorrect ? "correct" : "",
          (isAnswered && isSel && !isCorrect) || instantWrong ? "wrong" : "",
          isAnswered ? "locked" : ""
        ].filter(Boolean).join(" ");
        return `<button class="${cls}" data-option="${i}" ${isAnswered ? "disabled" : ""}>
          <span class="mark">${q.type === "judge" ? (i === 0 ? "对" : "错") : LETTERS[i]}</span>
          <span>${esc(text)}</span>
        </button>`;
      }).join("");

      document.querySelectorAll("[data-option]").forEach(btn => {
        btn.onclick = () => chooseOption(Number(btn.dataset.option));
      });

      if (isAnswered) showFeedback();
      else if (q.type === "multi" && selected.size) {
        $("feedback").className = "feedback show";
        $("feedback").innerHTML = "<strong>已选正确项</strong><p>多选题继续选择，点错会立即判错；选全正确项即判对。</p>";
      }
      else {
        $("feedback").className = "feedback";
        $("feedback").innerHTML = "";
      }
    }

    function getRoundScore() {
      const correct = Object.values(round.answers).filter(item => item.correct).length;
      return queue.length ? Math.round(correct / queue.length * 100) : 0;
    }

    function renderResult() {
      const correct = Object.values(round.answers).filter(item => item.correct).length;
      const total = queue.length || ROUND_SIZE;
      const score = getRoundScore();
      $("scoreNumber").textContent = score;
      $("scoreTitle").textContent = score >= 90 ? "很稳，继续保持" : score >= 75 ? "基础不错，回刷错题" : "建议再刷一轮";
      $("scoreText").textContent = `本轮 ${total} 道题，答对 ${correct} 道，答错 ${total - correct} 道，满分 100 分。`;
    }

    function shortPoint(topic) {
      const map = {
        "总论": "核心概念",
        "方法论": "立场观点方法",
        "发展": "现代化与高质量发展",
        "人民": "人民立场",
        "法治": "依法治国",
        "文化": "文化自信",
        "生态": "生态文明",
        "安全": "总体国家安全观",
        "强军": "强军目标",
        "外交": "人类命运共同体",
        "党建": "全面从严治党",
        "导论": "马克思主义中国化",
        "新民主主义革命": "革命理论",
        "社会主义改造": "一化三改",
        "社会主义建设探索": "建设道路探索",
        "邓小平理论": "社会主义本质",
        "三个代表": "党的建设",
        "科学发展观": "以人为本",
        "综合辨析": "易混考点",
        "反侵略斗争": "近代国情",
        "早期探索": "救亡探索",
        "辛亥革命": "民主革命",
        "五四与建党": "开天辟地",
        "大革命与土地革命": "革命道路",
        "抗日战争": "民族解放",
        "解放战争与新中国": "人民解放",
        "社会主义革命建设改革": "历史转折",
        "哲学导论": "哲学基础",
        "物质与意识": "唯物论",
        "唯物辩证法": "辩证法",
        "认识论": "实践认识",
        "历史唯物主义": "社会历史观",
        "资本主义": "政治经济学",
        "科学社会主义": "社会主义",
        "人生观": "人生价值",
        "理想信念": "精神之钙",
        "中国精神": "爱国创新",
        "社会主义核心价值观": "价值准则",
        "道德": "道德修养"
      };
      return map[topic] || "综合";
    }

    function chooseOption(i) {
      const q = queue[index];
      if (!q || round.answers[q.id]) return;
      if (q.type === "multi") {
        selected.add(i);
        if (q.a.includes(i)) {
          optionStates[i] = "correct";
          const complete = q.a.every(answer => selected.has(answer));
          if (complete) finalizeAnswer(q, true);
        } else {
          optionStates[i] = "wrong";
          finalizeAnswer(q, false);
        }
      } else {
        selected = new Set([i]);
        optionStates[i] = q.a.includes(i) ? "correct" : "wrong";
        finalizeAnswer(q, q.a.includes(i));
      }
      render();
    }

    function finalizeAnswer(q, correct) {
      if (round.answers[q.id]) return;
      round.answers[q.id] = { correct, picks: [...selected] };
      record.done += 1;
      if (correct) record.correct += 1;
      record.answered[q.id] = correct;
      if (Object.keys(round.answers).length >= queue.length) {
        round.done = true;
        record.lastScore = getRoundScore();
      }
      saveRecord();
    }

    function showFeedback() {
      const q = queue[index];
      const saved = round.answers[q.id];
      const correct = saved?.correct;
      const answer = q.a.map(i => q.type === "judge" ? q.o[i] : LETTERS[i]).join("、");
      const status = correct ? "回答正确" : "回答有误";
      $("feedback").className = "feedback show";
      $("feedback").innerHTML = `<strong>${esc(status)}：${esc(answer)}</strong><p>${esc(q.exp)}</p>`;
    }

    function move(delta) {
      if (!queue.length) return;
      index = Math.max(0, Math.min(queue.length - 1, index + delta));
      const q = queue[index];
      selected = new Set(round.answers[q.id]?.picks || []);
      optionStates = {};
      render();
    }

    function toggleFav() {
      const q = queue[index];
      if (!q) return;
      if (record.favIds.includes(q.id)) {
        record.favIds = record.favIds.filter(id => id !== q.id);
      } else {
        record.favIds.push(q.id);
      }
      saveRecord();
      render();
    }

    function renderReview() {
      const wrongIds = getRoundWrongIds();
      $("wrongBox").innerHTML = round.done
        ? miniList(wrongIds, "本轮没有错题，漂亮。", true)
        : `<p class="empty">本轮完成并出分后，这里会显示错题和解析。</p>`;
      $("favBox").innerHTML = miniList(record.favIds, "还没有收藏。遇到易混题可以点「收藏本题」。");
      document.querySelectorAll("[data-jump]").forEach(btn => {
        btn.onclick = () => jumpTo(Number(btn.dataset.jump));
      });
    }

    function miniList(ids, emptyText, showExp = false) {
      if (!ids.length) return `<p class="empty">${emptyText}</p>`;
      return ids.map(id => {
        const q = BANK.find(item => item.id === id);
        if (!q) return "";
        return `<div class="mini-item">
          <strong>${esc(questionType(q))} · ${esc(q.topic)}</strong>
          <span>${esc(q.q)}</span>
          ${showExp ? `<p>${esc(q.exp)}</p>` : ""}
          ${showExp ? "" : `<button class="small" data-jump="${q.id}">跳到此题</button>`}
        </div>`;
      }).join("");
    }

    function jumpTo(id) {
      const pos = queue.findIndex(q => q.id === id);
      if (pos >= 0) {
        index = pos;
        selected = new Set();
        render();
      }
    }

    $("btnCourseXsd").onclick = () => setCourse("xsd");
    $("btnCourseMao").onclick = () => setCourse("mao");
    $("btnCourseHistory").onclick = () => setCourse("history");
    $("btnCourseMarx").onclick = () => setCourse("marx");
    $("btnCourseEthics").onclick = () => setCourse("ethics");
    $("btnNext").onclick = () => move(1);
    $("btnStar").onclick = toggleFav;
    $("btnShuffle").onclick = shuffleQueue;
    $("btnWrong").onclick = () => {
      const box = $("wrongBox");
      const top = box.getBoundingClientRect().top + window.pageYOffset - 18;
      window.scrollTo({ top, behavior: "smooth" });
    };
    $("btnReset").onclick = () => {
      if (!confirm("确定清空本浏览器中的刷题进度、错题和收藏吗？")) return;
      record = { done: 0, correct: 0, wrongIds: [], favIds: [], answered: {}, lastScore: null };
      saveRecord();
      buildQueue();
    };
    $("btnRestart").onclick = () => {
      buildQueue();
    };
    $("btnReviewWrong").onclick = () => {
      const box = $("wrongBox");
      const top = box.getBoundingClientRect().top + window.pageYOffset - 18;
      window.scrollTo({ top, behavior: "smooth" });
    };

    document.addEventListener("keydown", event => {
      if (event.target.closest("button,input,select,textarea")) return;
      const q = queue[index];
      if (!q) return;
      const key = event.key.toLowerCase();
      const pos = ["a", "b", "c", "d", "e", "f"].indexOf(key);
      if (pos >= 0 && pos < q.o.length) chooseOption(pos);
      if (event.key === "ArrowRight") move(1);
      if (event.key === "ArrowLeft") move(-1);
    });

    renderStatic();
    buildQueue();
  </script>
</body>
</html>
